<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sélection du Quiz | Academy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-blue: #060c21;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f2d06b 100%);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #112240 0%, #060c21 100%);
            color: var(--white); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-x: hidden; /* Evite scroll sou kote */
            padding: 20px;
            box-sizing: border-box;
        }

       
        .top-nav {
            position: absolute; top: 20px; width: 100%; 
            display: flex; justify-content: space-between; padding: 0 40px;
            box-sizing: border-box; z-index: 10;
        }

        .timer-box { 
            border: 1px solid var(--gold); padding: 8px 15px; border-radius: 50px; 
            background: var(--glass); backdrop-filter: blur(5px); font-size: 0.9rem;
        }

        .logout-btn { 
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.2); 
            padding: 8px 15px; border-radius: 50px; transition: 0.3s; font-size: 0.9rem;
        }
        .logout-btn:hover { background: #ff4d4d; border-color: #ff4d4d; }

        /* --- GRID RESPONSIVE --- */
        .grid-choix { 
            display: flex; gap: 20px; z-index: 1; flex-wrap: wrap; justify-content: center; 
            width: 100%; max-width: 800px;
        }

        .card-quiz {
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px; width: 160px; border-radius: 20px; text-align: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        .card-quiz:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2); }
        .card-quiz i { font-size: 2.8rem; color: var(--gold); margin-bottom: 15px; display: block; }
        .card-quiz span { font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); 
            display: none; align-items: center; justify-content: center; 
            z-index: 1000; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #0d1b3e; border: 1px solid var(--gold);
            padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            position: relative; animation: modalBounce 0.5s ease;
        }

        @keyframes modalBounce {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-level {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 15px 20px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1);
            color: white; text-decoration: none; border-radius: 12px;
            font-weight: 600; transition: 0.3s; box-sizing: border-box;
        }
        .btn-level:hover { background: var(--gold-gradient); color: var(--deep-blue); border-color: transparent; }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 600px) {
            .top-nav { padding: 0 20px; position: relative; top: 0; margin-bottom: 30px; }
            body { justify-content: flex-start; padding-top: 40px; }
            h1 { font-size: 1.8rem !important; }
            .card-quiz { width: 120px; padding: 20px; }
            .card-quiz i { font-size: 2rem; }
            .card-quiz span { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="timer-box">
            <i class="fas fa-clock" style="color: var(--gold);"></i> 
            <span id="time">200</span>s
        </div>

        <a th:href="@{/logout}" onclick="localStorage.removeItem('quizTimer')" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Quitter
        </a>
    </div>

    <div style="text-align: center; margin-bottom: 40px; margin-top: 20px;">
        <div style="color: var(--gold); font-weight: bold; letter-spacing: 2px; font-size: 0.8rem;">BIENVENUE, <span th:text="${prenom}">STUDENT</span></div>
        <h1 style="font-weight: 300; font-size: 2.5rem; margin-top: 10px;">Espace d'Évaluation</h1>
    </div>

    <div class="grid-choix">
        <div class="card-quiz" onclick="openModal('Anglais')">
            <i class="fas fa-atlas"></i><span>Anglais</span>
        </div>
        <div class="card-quiz" onclick="openModal('Francais')">
            <i class="fas fa-feather-alt"></i><span>Français</span>
        </div>
        <div class="card-quiz" onclick="openModal('Chimie')">
            <i class="fas fa-flask"></i><span>Chimie</span>
        </div>
    </div>

    <div id="levelModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--gold); text-transform: uppercase;">MATIÈRE</h2>
            <p style="opacity: 0.7; font-size: 0.9rem; margin-bottom: 20px;">Choisissez votre niveau de difficulté</p>
            <a id="link1" href="#" class="btn-level"><span>Niveau 1</span> <i class="fas fa-star"></i></a>
            <a id="link2" href="#" class="btn-level"><span>Niveau 2</span> <i class="fas fa-star-half-alt"></i></a>
            <a id="link3" href="#" class="btn-level"><span>Niveau 3</span> <i class="fas fa-fire"></i></a>
            <span style="margin-top: 20px; display: inline-block; cursor: pointer; opacity: 0.5;" onclick="closeModal()">
                <i class="fas fa-times"></i> Fermer
            </span>
        </div>
    </div>

    <script>
        // Timer la rete menm jan an
        let timeLeft = localStorage.getItem('quizTimer') || 200;
        timeLeft = parseInt(timeLeft);

        const timerDisplay = document.getElementById('time');
        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            localStorage.setItem('quizTimer', timeLeft);
            if (timeLeft <= 0) {
                clearInterval(countdown);
                localStorage.removeItem('quizTimer');
                window.location.href = "/logout";
            }
        }, 1000);

        function openModal(matiere) {
            document.getElementById('modalTitle').innerText = matiere;
            document.getElementById('link1').href = "/quiz/" + matiere + "/1";
            document.getElementById('link2').href = "/quiz/" + matiere + "/2";
            document.getElementById('link3').href = "/quiz/" + matiere + "/3";
            document.getElementById('levelModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('levelModal').style.display = 'none'; }
    </script>
</body>
</html>
