<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail d'Évaluation | Excellence</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-blue: #060c21;
            --glass: rgba(255, 255, 255, 0.03);
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--deep-blue);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
           
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a2a6c 0%, #060c21 100%);
            z-index: -1;
        }

        .main-card {
            display: flex;
            width: 95%;
            max-width: 900px; 
            min-height: 550px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            flex-direction: row; 
        }

        .info-side {
            flex: 1;
            padding: 40px 60px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), transparent);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-side h1 {
            font-size: 3rem;
            margin: 0;
            line-height: 1;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
        }

        .form-side {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 20px 0;
            }

            .main-card {
                flex-direction: column; 
                margin: 20px;
            }

            .info-side {
                padding: 40px 30px;
                text-align: center;
            }

            .info-side h1 {
                font-size: 2rem; 
            }

            .form-side {
                padding: 40px 30px;
            }

            .info-side br {
                display: none; 
            }
        }

        
        .input-group { position: relative; margin-bottom: 30px; }
        .input-group input {
            width: 100%; padding: 15px 0; background: transparent;
            border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        .input-group label {
            position: absolute; top: 15px; left: 0; pointer-events: none;
            transition: 0.3s; opacity: 0.5;
        }
        .input-group input:focus ~ label, .input-group input:valid ~ label {
            top: -10px; font-size: 0.8rem; color: var(--gold); opacity: 1;
        }
        .input-group input:focus { border-bottom: 1px solid var(--gold); }

        .btn-submit {
            background: var(--gold); color: var(--deep-blue); border: none;
            padding: 15px; border-radius: 50px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            transition: 0.3s; width: 100%;
        }
        .btn-submit:hover { transform: translateY(-3px); filter: brightness(1.1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="main-card">
        <div class="info-side">
            <div style="color: var(--gold); font-weight: 800; letter-spacing: 3px; margin-bottom: 10px;">QUIZ MASTER</div>
            <h1>PRÊT À<br>RELEVER LE<br>DÉFI ?</h1>
            <p>Identifiez-vous pour accéder aux épreuves.</p>
        </div>

        <div class="form-side">
            <h2 style="font-weight: 300; letter-spacing: 2px; margin-bottom: 30px;">IDENTIFICATION</h2>
            
            <form th:action="@{/login}" method="post">
                <div class="input-group">
                    <input type="text" name="nom" required autocomplete="off">
                    <label>Votre Nom</label>
                </div>
                <div class="input-group">
                    <input type="text" name="prenom" required autocomplete="off">
                    <label>Votre Prénom</label>
                </div>
                
                <button type="submit" class="btn-submit">
                    Lancer le Test <i class="fas fa-bolt" style="margin-left: 10px;"></i>
                </button>
            </form>
        </div>
    </div>

</body>
</html>
