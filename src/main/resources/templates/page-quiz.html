<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz en Cours | Academy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>  
        :root { --gold: #d4af37; --deep-blue: #060c21; --white: #ffffff; --glass: rgba(255, 255, 255, 0.05); }
        
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center, #112240 0%, #060c21 100%); 
            color: var(--white); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; /* Redwi padding sou kote yo */
        }

        .quiz-header { 
            width: 100%; 
            max-width: 800px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            background: var(--glass); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .timer-quiz { color: var(--gold); font-weight: bold; font-size: 1.1rem; min-width: 80px; text-align: right; }

        .question-container { 
            width: 100%; 
            max-width: 800px; 
            background: var(--glass); 
            padding: 25px; 
            border-radius: 20px; 
            border-left: 5px solid var(--gold); 
            margin-bottom: 20px; 
            backdrop-filter: blur(10px); 
            text-align: left; 
            box-sizing: border-box;
        }

        .enonce { font-size: 1.1rem; margin-bottom: 20px; color: var(--gold); font-weight: 500; line-height: 1.4; }

        /* --- GRID RESPONSIVE --- */
        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 2 kolòn sou laptop */
            gap: 12px; 
        }

        .option-item { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.95rem;
        }

        .option-item:hover { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        input[type="radio"] { accent-color: var(--gold); transform: scale(1.2); cursor: pointer; }

        .btn-submit { 
            background: var(--gold); 
            color: var(--deep-blue); 
            border: none; 
            padding: 16px 40px; 
            border-radius: 50px; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
            margin: 20px 0 40px; 
            font-size: 1rem; 
            width: 100%; 
            max-width: 300px; 
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); 
        }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 650px) {
            .options-grid { 
                grid-template-columns: 1fr; /* 1 sèl kolòn sou mobil */
            }

            .quiz-header { 
                flex-direction: column; 
                gap: 10px; 
                text-align: center; 
                font-size: 0.9rem;
            }

            .timer-quiz { text-align: center; }

            .enonce { font-size: 1rem; }
            
            .question-container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="quiz-header">
        <div>
            <span style="opacity: 0.6;">Matière:</span> <b th:text="${nomQuiz}">Anglais</b> |
            <span style="opacity: 0.6;">Niveau:</span> <b th:text="${niveauActuel}">1</b>
        </div>
        <div class="timer-quiz">
            <i class="fas fa-hourglass-half"></i> <span id="time">200</span>s
        </div>
    </div>

    <form id="quizForm" th:action="@{/quiz/soumettre}" method="post" style="width: 100%; max-width: 800px; text-align: center;">
        
        <input type="hidden" name="categorieQuiz" th:value="${nomQuiz}">
        <input type="hidden" name="niveauQuiz" th:value="${niveauActuel}">
        <input type="hidden" id="seconds_taken" name="seconds_taken" value="0">

        <div th:each="q, iter : ${questions}" class="question-container">
            <div class="enonce">
                <span th:text="${iter.count} + '. ' + ${q.enonce}">Kesyon</span>
            </div>
            
            <div class="options-grid">
                <label class="option-item">
                    <input type="radio" th:name="'q' + ${q.id}" value="A" required>
                    <span th:text="${q.optionA}">Option A</span>
                </label>
                <label class="option-item">
                    <input type="radio" th:name="'q' + ${q.id}" value="B">
                    <span th:text="${q.optionB}">Option B</span>
                </label>
                <label class="option-item">
                    <input type="radio" th:name="'q' + ${q.id}" value="C">
                    <span th:text="${q.optionC}">Option C</span>
                </label>
                <label class="option-item">
                    <input type="radio" th:name="'q' + ${q.id}" value="D">
                    <span th:text="${q.optionD}">Option D</span>
                </label>
            </div>
        </div>

        <button type="submit" class="btn-submit">Terminer le Quiz</button>
    </form>

    <script>
        const limit = 200;
        let timeLeft = localStorage.getItem('quizTimer');

        if (timeLeft === null) {
            timeLeft = limit;
        } else {
            timeLeft = parseInt(timeLeft);
        }

        const timerDisplay = document.getElementById('time');
        const hiddenInputTan = document.getElementById('seconds_taken');
        
        timerDisplay.innerText = timeLeft;

        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            localStorage.setItem('quizTimer', timeLeft);
            
            let usedTime = limit - timeLeft;
            hiddenInputTan.value = usedTime;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                localStorage.removeItem('quizTimer');
                alert("Temps écoulé ! Soumission automatique.");
                document.getElementById('quizForm').submit();
            }
        }, 1000);

        document.getElementById('quizForm').onsubmit = function() {
            localStorage.removeItem('quizTimer');
            hiddenInputTan.value = limit - timeLeft;
        };
    </script>
</body>
</html>
